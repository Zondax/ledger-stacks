# `panic_immediate_abort` is no longer a build-std feature: as of
# nightly-2025-12-05 it became the `immediate-abort` panic strategy. It is now
# selected via `panic = "immediate-abort"` in `[profile.release]` of Cargo.toml
# (gated by `cargo-features = ["panic-immediate-abort"]`), and `core` is rebuilt
# with that strategy through `-Z build-std=core` passed in app/Makefile.

[build]

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
    "--emit", "asm",
	"-C", "relocation-model=ropi",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-Tlink.ld",
    "-C", "llvm-args=--inline-threshold=0",
]

[target.'cfg(target_os = "linux")']
rustflags = [
    "-C",
    "link-arg=-Wl,--gc-sections",
    "-C",
    "link-arg=-Wl,--as-needed",
    "-C",
    "llvm-args=--inline-threshold=0",
]
