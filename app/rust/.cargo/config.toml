[build]

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
    "--emit", "asm",
	"-C", "relocation-model=ropi",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-Tlink.ld",
    "-C", "llvm-args=--inline-threshold=0",
]
# immediate-abort is selected via the Cargo.toml [profile.release] panic setting
# (cargo-features = ["panic-immediate-abort"]); build-std=core is passed on the
# cargo command line in the Makefile (nightly-2025-12-05).

[target.'cfg(target_os = "linux")']
rustflags = [
    "-C",
    "link-arg=-Wl,--gc-sections",
    "-C",
    "link-arg=-Wl,--as-needed",
    "-C",
    "llvm-args=--inline-threshold=0",
]
