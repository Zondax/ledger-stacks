[build]

[target.'cfg(all(target_arch = "arm", target_os = "none"))']
rustflags = [
    "--emit", "asm",
	"-C", "relocation-model=ropi",
    "-C", "link-arg=-nostartfiles",
    "-C", "link-arg=-Tlink.ld",
    "-C", "llvm-args=--inline-threshold=0",
    "-Z", "unstable-options",
    "-C", "panic=immediate-abort"
]
[unstable]
build-std=["core"]
# panic_immediate_abort is no longer a build-std feature (nightly-2025-12-05);
# immediate-abort is selected via the device-target rustflags above.

[target.'cfg(target_os = "linux")']
rustflags = [
    "-C",
    "link-arg=-Wl,--gc-sections",
    "-C",
    "link-arg=-Wl,--as-needed",
    "-C",
    "llvm-args=--inline-threshold=0",
]
