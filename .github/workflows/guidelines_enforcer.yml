name: Ensure compliance with Ledger guidelines

# This workflow is mandatory in all applications
# It calls a reusable workflow guidelines_enforcer developed by Ledger's internal developer team.
# The successful completion of the reusable workflow is a mandatory step for an app to be available on the Ledger
# application store.
#
# More information on the guidelines can be found in the repository:
# LedgerHQ/ledger-app-workflows/

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - main
      - develop
      - master
      - dev

jobs:
  guidelines_enforcer:
    name: Call Ledger guidelines_enforcer
    # Pinned to v1.101.0 (not @v1). v1.102.0 (2026-06-30) added a "Build application"
    # job that compiles C apps in ledger-app-builder-lite (clang only, no Rust) to
    # glyph-filter the manifest. This app is sdk="C" but embeds a Rust static lib via
    # its Makefile, so `make rust` fails with "cargo: command not found". v1.101.0 is
    # the last release before that job existed. Revert to @v1 once the enforcer exposes
    # a builder override for C+Rust hybrids.
    uses: LedgerHQ/ledger-app-workflows/.github/workflows/reusable_guidelines_enforcer.yml@v1.101.0
